function matchChefs(pref){
  if(!pref.trim())return CHEFS;
  const kw=pref.toLowerCase();
  const m=CHEFS.filter(c=>c.specialty.toLowerCase().includes(kw)||c.meals.some(x=>x.toLowerCase().includes(kw)));
  return m.length?m:CHEFS;
}

function Stars({value=5,onChange}){
  return(
    <div style={{display:"flex",gap:3}}>
      {[1,2,3,4,5].map(s=>(
        <span key={s} onClick={()=>onChange&&onChange(s)}
          style={{fontSize:22,cursor:onChange?"pointer":"default",
            color:s<=value?"#F4821F":"#ddd",transition:"color 0.15s"}}>★</span>
      ))}
    </div>
  );
}

function Badge({text,color=C.saffron}){
  return <span style={{background:color+"22",color,border:`1px solid ${color}55`,
    borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,letterSpacing:0.5,whiteSpace:"nowrap"}}>{text}</span>;
}

function Card({children,style={}}){
  return <div style={{background:"#fff",borderRadius:16,padding:"18px 20px",
    boxShadow:"0 2px 16px rgba(0,0,0,0.07)",border:"1px solid #f0e8dc",...style}}>{children}</div>;
}

function Btn({children,onClick,style={},variant="primary",disabled=false}){
  const base={border:"none",borderRadius:10,padding:"12px 20px",fontWeight:700,
    cursor:disabled?"not-allowed":"pointer",fontSize:14,transition:"all 0.2s",
    fontFamily:"inherit",opacity:disabled?0.6:1};
  const variants={
    primary:{background:`linear-gradient(135deg,${C.saffron},${C.rust})`,color:"#fff"},
    outline:{background:"transparent",color:C.saffron,border:`2px solid ${C.saffron}`},
    ghost:{background:C.cream,color:C.charcoal},
    green:{background:`linear-gradient(135deg,${C.sage},${C.cardamom})`,color:"#fff"},
  };
  return <button onClick={!disabled?onClick:undefined} style={{...base,...variants[variant],...style}}>{children}</button>;
}

// ── LOGIN ──────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const[form,setForm]=useState({name:"",phone:"",email:"",address:""});
  const[role,setRole]=useState("user");
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const valid=form.name&&form.phone&&form.email&&form.address;

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#fff8f0 0%,#fdecd5 50%,#fce3c8 100%)",
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:440}} className="fade-in">
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:6}}>🍱</div>
          <h1 style={{fontSize:30,fontWeight:900,color:C.rust,margin:0,letterSpacing:-1}}>Home Plate</h1>
          <p style={{color:C.muted,margin:"6px 0 0",fontStyle:"italic",fontSize:14}}>Home-cooked meals, delivered with love</p>
        </div>
        <Card>
          <div style={{display:"flex",gap:8,marginBottom:18}}>
            {["user","chef"].map(r=>(
              <button key={r} onClick={()=>setRole(r)} style={{
                flex:1,padding:"10px 0",borderRadius:8,border:"none",fontWeight:700,
                fontFamily:"inherit",cursor:"pointer",fontSize:14,transition:"all 0.2s",
                background:role===r?`linear-gradient(135deg,${C.saffron},${C.rust})`:C.cream,
                color:role===r?"#fff":C.muted}}>
                {r==="user"?"🍽️ I'm Hungry":"👩‍🍳 I'm a Chef"}
              </button>
            ))}
          </div>
          {["name","phone","email","address"].map(f=>(
            <div key={f} style={{marginBottom:13}}>
              <label style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:0.5,
                textTransform:"uppercase",display:"block",marginBottom:4}}>
                {f==="address"?"Delivery Address":f.charAt(0).toUpperCase()+f.slice(1)}
              </label>
              <input value={form[f]} onChange={e=>upd(f,e.target.value)}
                placeholder={f==="phone"?"+91 98765 43210":f==="email"?"you@email.com":""}
                type={f==="email"?"email":f==="phone"?"tel":"text"}
                style={{width:"100%",padding:"10px 13px",borderRadius:8,
                  border:`1.5px solid ${form[f]?C.saffron:"#e8ddd0"}`,fontSize:14,
                  background:"#fffdf9",outline:"none",transition:"border-color 0.2s",color:C.charcoal}}/>
            </div>
          ))}
          <Btn onClick={()=>onLogin({...form,role})} disabled={!valid}
            style={{width:"100%",marginTop:6,fontSize:15,padding:"13px"}}>
            {role==="user"?"Find My Chef →":"Start Cooking →"}
          </Btn>
        </Card>
        <p style={{textAlign:"center",color:C.muted,fontSize:12,marginTop:14}}>🔒 Your data is safe & never shared</p>
      </div>
    </div>
  );
}

                          <button onClick={()=>onAddToCart(item,chef,1)} style={{width:26,height:26,borderRadius:"50%",border:"none",background:`linear-gradient(135deg,${C.saffron},${C.rust})`,color:"#fff",fontWeight:900,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                        </div>
                      ):(
                        <button onClick={()=>onAddToCart(item,chef,1)} style={{background:`linear-gradient(135deg,${C.saffron},${C.rust})`,border:"none",borderRadius:8,padding:"5px 10px",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>+ Add</button>
                      );
                    })()}
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
        {/* Footer */}
        <div style={{padding:"12px 16px",borderTop:"1px solid #f0e8dc",flexShrink:0,background:"#fffbf5"}}> 
          {cart.length>0&&(
            <div style={{marginBottom:8,padding:"9px 12px",background:"linear-gradient(135deg,#fff8f0,#fef3e8)",borderRadius:10,border:`1px solid ${C.saffron}44`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12,color:C.muted}}>🛒 {cart.reduce((s,x)=>s+x.qty,0)} item{cart.reduce((s,x)=>s+x.qty,0)!==1?"s":""} in cart</span>
              <span style={{fontWeight:900,color:C.rust,fontSize:13}}>₹{cart.reduce((s,x)=>s+x.item.price*x.qty,0)}</span>
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{flex:1,padding:"11px",borderRadius:10,border:`2px solid ${C.saffron}`,background:"transparent",color:C.saffron,fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>← Back</button>
            <button onClick={()=>onOrder(chef)} style={{flex:2,padding:"11px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${C.saffron},${C.rust})`,color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
              View Cart 🛒
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

  const[pref,setPref]=useState("");
  const[chef,setChef]=useState(null);
  const[stage,setStage]=useState(0);
  const[rating,setRating]=useState(5);
  const[note,setNote]=useState("");
  const[sent,setSent]=useState(false);
  const[analysis,setAnalysis]=useState("");
  const[loading,setLoading]=useState(false);
  const[chefRatings,setChefRatings]=useState({});
  const[menuChef,setMenuChef]=useState(null);
  const[cart,setCart]=useState([]); // [{item, chef, qty}]
  const[cartOpen,setCartOpen]=useState(false);
  const timerRef=useRef(null);

  function addToCart(item,chef){
    setCart(prev=>{
      const idx=prev.findIndex(x=>x.item.name===item.name&&x.chef.id===chef.id);
      if(idx>=0){const n=[...prev];n[idx]={...n[idx],qty:n[idx].qty+1};return n;}
      return [...prev,{item,chef,qty:1}];
    });
  }
  function removeFromCart(itemName,chefId){
    setCart(prev=>{
      const idx=prev.findIndex(x=>x.item.name===itemName&&x.chef.id===chefId);
      if(idx<0)return prev;
      const n=[...prev];
      if(n[idx].qty>1){n[idx]={...n[idx],qty:n[idx].qty-1};return n;}
      return n.filter((_,i)=>i!==idx);
    });
  }
  function clearCart(){setCart([]);}
  const cartTotal=cart.reduce((s,x)=>s+x.item.price*x.qty,0);
  const cartCount=cart.reduce((s,x)=>s+x.qty,0);

  const filtered=matchChefs(pref);

  function startOrder(c){
    setChef(c);setStage(0);setView("track");
    let s=0;
    timerRef.current=setInterval(()=>{
      s++;setStage(s);
      if(s>=ORDER_STAGES.length-1)clearInterval(timerRef.current);
    },3000);
  }

  async function fetchAI(){
    setLoading(true);setAnalysis("");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,
          messages:[{role:"user",content:`You are a warm food & nutrition advisor for a home-chef delivery app. User ${user.name} ordered ${chef?.specialty||"mixed"} food. Rating: ${rating}/5. Note: "${note||"Great food!"}". Give a friendly weekly analysis in 3 short paragraphs: what went well, nutritional tips, meal variety suggestions. Use food emojis.`}]})
      });
      const d=await r.json();
      setAnalysis(d.content?.[0]?.text||"Great choices this week! Keep enjoying home-cooked meals 🍱");

                    <Stars value={fb.rating}/>
                  </div>
                  <div style={{fontSize:12,color:C.muted,fontStyle:"italic"}}>"{fb.note}"</div>
                </div>
              ))}
            </Card>
            <Btn onClick={getAI} style={{width:"100%",marginBottom:14}}>🤖 Generate Weekly AI Analysis →</Btn>
            {(aiLoad||aiText)&&(
              <Card>
                <div style={{fontWeight:800,color:C.rust,marginBottom:11,fontSize:14}}>🤖 AI Weekly Insights for You</div>
                {aiLoad?(
                  <div style={{display:"flex",alignItems:"center",gap:7,color:C.muted}}>
                    <div style={{width:18,height:18,border:`3px solid ${C.sage}`,borderTopColor:"transparent",
                      borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
                    Analysing your kitchen performance...
                  </div>
                ):(
                  <div style={{fontSize:13,color:C.charcoal,lineHeight:1.7,whiteSpace:"pre-wrap",
                    background:"#f0fdf4",borderRadius:8,padding:11}}>{aiText}</div>
                )}
              </Card>
            )}
          </div>
        )}


        {/* ── MY MENU MANAGEMENT ── */}
        {cv==="menu"&&(
          <div className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{fontSize:21,fontWeight:900,color:C.cardamom,margin:0}}>📝 My Menu</h2>
              <button onClick={()=>setShowNewCat(v=>!v)} style={{background:`linear-gradient(135deg,${C.sage},${C.cardamom})`,border:"none",borderRadius:8,padding:"7px 13px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Category</button>
            </div>

            {/* Week's Specials strip */}
            {chefMenu.flatMap(s=>s.items).filter(i=>i.weekSpecial).length>0&&(
              <div style={{marginBottom:16,padding:"12px 14px",background:"linear-gradient(135deg,#fef9c3,#fde68a)",borderRadius:14,border:"1px solid #f0d060"}}>
                <div style={{fontWeight:800,fontSize:13,color:C.clay,marginBottom:8}}>⭐ This Week's Specials</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {chefMenu.flatMap(s=>s.items).filter(i=>i.weekSpecial).map(i=>(
                    <div key={i.name} style={{background:"#fff",borderRadius:10,padding:"5px 10px",display:"flex",alignItems:"center",gap:5,border:"1px solid #f0d060"}}>
                      <span style={{fontSize:16}}>{i.emoji}</span>
                      <span style={{fontSize:12,fontWeight:700,color:C.charcoal}}>{i.name}</span>
                      <span style={{fontSize:12,fontWeight:800,color:C.rust}}>₹{i.price}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* New category form */}
            {showNewCat&&(
              <div style={{background:"#f0fdf4",borderRadius:12,padding:"14px",marginBottom:14,border:"1px solid #bbf7d0"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.cardamom,marginBottom:8}}>New Category Name</div>
                <div style={{display:"flex",gap:8}}>
                  <input value={newCatName} onChange={e=>setNewCatName(e.target.value)} placeholder="e.g. Starters, Drinks..."
                    style={{flex:1,padding:"9px 12px",borderRadius:8,border:`1.5px solid ${C.sage}`,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
                  <button onClick={addCategory} style={{padding:"9px 16px",borderRadius:8,background:`linear-gradient(135deg,${C.sage},${C.cardamom})`,border:"none",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>Add</button>
                </div>
              </div>
            )}

            {/* Menu Categories */}
            {chefMenu.map(section=>(
              <div key={section.category} style={{marginBottom:16}}>
                {/* Category header */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:1,paddingLeft:8,borderLeft:`3px solid ${C.sage}`}}>{section.category}</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>{setEditingCategory(section.category);setShowAddForm(true);}} style={{fontSize:11,fontWeight:700,color:C.sage,background:"#f0fdf4",border:`1px solid ${C.sage}44`,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit"}}>+ Add Dish</button>
                    <button onClick={()=>deleteCategory(section.category)} style={{fontSize:11,fontWeight:700,color:"#e53935",background:"#fff5f5",border:"1px solid #ffcdd2",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit"}}>🗑</button>
                  </div>
                </div>

                {section.items.length===0&&(
                  <div style={{textAlign:"center",padding:"12px",color:C.muted,fontSize:12,background:"#f9f9f9",borderRadius:10,border:"1px dashed #e0e0e0"}}>No dishes yet — add one above</div>
                )}

                {section.items.map(item=>(
                  <div key={item.name} style={{background:item.weekSpecial?"linear-gradient(135deg,#fffbeb,#fef3c7)":"#fff",borderRadius:12,padding:"11px 12px",marginBottom:8,border:item.weekSpecial?"1.5px solid #fbbf24":"1px solid #f0e8dc",display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:24,flexShrink:0}}>{item.emoji}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                        <span style={{fontWeight:800,fontSize:13,color:C.charcoal}}>{item.name}</span>
                        {item.weekSpecial&&<span style={{fontSize:9,fontWeight:800,background:"#fbbf24",color:"#78350f",padding:"1px 6px",borderRadius:20}}>⭐ Week's Special</span>}
                      </div>
                      <div style={{fontSize:10,color:C.muted,marginTop:1}}>{item.desc}</div>
                      <div style={{fontSize:12,fontWeight:900,color:C.rust,marginTop:3}}>₹{item.price}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0,alignItems:"center"}}>
                      <button onClick={()=>toggleWeekSpecial(section.category,item.name)}
                        title={item.weekSpecial?"Remove from Week's Special":"Mark as Week's Special"}
                        style={{background:item.weekSpecial?"#fbbf24":"#f9f9f9",border:item.weekSpecial?"1.5px solid #f59e0b":"1.5px solid #e0e0e0",borderRadius:8,padding:"4px 7px",cursor:"pointer",fontSize:14}}>
                        ⭐
                      </button>
                      <button onClick={()=>deleteItem(section.category,item.name)} style={{background:"#fff5f5",border:"1.5px solid #ffcdd2",borderRadius:8,padding:"4px 7px",cursor:"pointer",fontSize:14}}>🗑️</button>
                    </div>
                  </div>
                ))}
              </div>
            ))}

            {/* Add Item Form */}
            {showAddForm&&(
              <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
                onClick={e=>{if(e.target===e.currentTarget){setShowAddForm(false);setEditingCategory("");}}}>
                <div style={{width:"100%",maxWidth:500,background:"#fff",borderRadius:"20px 20px 0 0",padding:"20px 18px 28px",boxShadow:"0 -8px 40px rgba(0,0,0,0.2)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                    <div style={{fontWeight:800,color:C.cardamom,fontSize:16}}>➕ Add Dish to "{editingCategory}"</div>
                    <button onClick={()=>{setShowAddForm(false);setEditingCategory("");}} style={{background:"#f0f0f0",border:"none",borderRadius:"50%",width:30,height:30,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                  </div>

                  {/* Emoji picker */}
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Pick Emoji</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {EMOJIS.map(e=>(
                        <button key={e} onClick={()=>setNewItem(p=>({...p,emoji:e}))}
                          style={{fontSize:20,width:36,height:36,borderRadius:8,border:newItem.emoji===e?`2px solid ${C.saffron}`:`1.5px solid #e8e8e8`,background:newItem.emoji===e?"#fff8f0":"#fafafa",cursor:"pointer"}}>
                          {e}
                        </button>
                      ))}
                    </div>
                  </div>

                  {[{key:"name",label:"Dish Name",ph:"e.g. Paneer Butter Masala"},{key:"desc",label:"Description",ph:"Brief description of the dish"},{key:"price",label:"Price (₹)",ph:"e.g. 140",type:"number"}].map(f=>(
                    <div key={f.key} style={{marginBottom:10}}>
                      <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{f.label}</div>
                      <input value={newItem[f.key]} onChange={e=>setNewItem(p=>({...p,[f.key]:e.target.value}))}
                        placeholder={f.ph} type={f.type||"text"}
                        style={{width:"100%",padding:"9px 12px",borderRadius:8,border:`1.5px solid ${newItem[f.key]?C.sage:"#e8e8e8"}`,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
                    </div>
                  ))}

                  {/* Tag selector */}
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Tag</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {TAGS.map(t=>(
                        <button key={t} onClick={()=>setNewItem(p=>({...p,tag:t}))}
                          style={{fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:20,cursor:"pointer",fontFamily:"inherit",
                            background:newItem.tag===t?C.saffron:"#f0f0f0",color:newItem.tag===t?"#fff":C.muted,
                            border:newItem.tag===t?`1px solid ${C.saffron}`:"1px solid #e0e0e0"}}>
                          {t}
                        </button>
                      ))}
                    </div>
                  </div>

                  <button onClick={addItem} disabled={!newItem.name||!newItem.price}
                    style={{width:"100%",padding:"13px",borderRadius:10,border:"none",fontFamily:"inherit",
                      background:newItem.name&&newItem.price?`linear-gradient(135deg,${C.sage},${C.cardamom})`:`#e0e0e0`,
                      color:"#fff",fontWeight:800,fontSize:14,cursor:newItem.name&&newItem.price?"pointer":"not-allowed"}}>
                    ✅ Add to Menu
                  </button>
                </div>
              </div>
            )}
          </div>
        )}

      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",
        borderTop:"1px solid #e0f2e9",display:"flex",boxShadow:"0 -4px 20px rgba(0,0,0,0.08)",zIndex:100}}>
        {nav.map(item=>(
          <button key={item.id} onClick={()=>setCv(item.id)} style={{
            flex:1,padding:"9px 4px",border:"none",background:"transparent",
            cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,
            color:cv===item.id?C.cardamom:C.muted,fontFamily:"inherit"}}>
            <span style={{fontSize:19}}>{item.icon}</span>
            <span style={{fontSize:10,fontWeight:cv===item.id?800:500}}>{item.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
